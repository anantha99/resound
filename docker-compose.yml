services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: resound
      POSTGRES_USER: resound
      POSTGRES_PASSWORD: resound
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resound -d resound"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: resound
      POSTGRES_PWD: resound
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"

  api:
    build: .
    command: uv run resound api --host 0.0.0.0 --port 8000
    environment:
      RESOUND_DATABASE_URL: postgresql+psycopg://resound:resound@postgres:5432/resound
      RESOUND_TEMPORAL_ADDRESS: temporal:7233
      RESOUND_TEMPORAL_NAMESPACE: default
      RESOUND_TEMPORAL_TASK_QUEUE: resound-default
      RESOUND_REQUIRE_TENANT_HEADER: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build: .
    command: uv run resound worker
    environment:
      RESOUND_DATABASE_URL: postgresql+psycopg://resound:resound@postgres:5432/resound
      RESOUND_TEMPORAL_ADDRESS: temporal:7233
      RESOUND_TEMPORAL_NAMESPACE: default
      RESOUND_TEMPORAL_TASK_QUEUE: resound-default
      RESOUND_REQUIRE_TENANT_HEADER: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
