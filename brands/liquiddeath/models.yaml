# Brand-specific model overrides for Liquid Death.
#
# Field-level merge over config/models.yaml: only fields listed here
# override the global default; everything else (fallbacks, temperature,
# max_tokens, timeout_s) inherits.
#
# Why we override classify here: Liquid Death's brand voice is
# deliberately loud and sarcastic. The default classify model can
# misread ironic praise as genuine and snark as outage-level negative.
# Routing this brand to a stronger model materially improves precision
# on the action_class field.
#
# TESTING (May 2026): override disabled — global default
# (anthropic/claude-haiku-4-5) is cheap enough to iterate freely. Before
# recording the actual demo, uncomment the Opus override below to get the
# best read on sarcasm.

# classify:
#   model: anthropic/claude-opus-4-7
