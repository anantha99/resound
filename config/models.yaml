        - anthropic/claude-haiku-4-5

    classify:
      model: openai/gpt-5-mini
      temperature: 0.1
      max_tokens: 1024
      timeout_s: 30
      fallbacks:
        - anthropic/claude-sonnet-5
        - google/gemini-3.1-flash-lite

