# =============================================================================
# Resound LLM Model Configuration — Global Defaults
# =============================================================================
# Each stage uses a specific model tuned to its latency/cost/capability needs.
# These are DEMO-PROVISIONAL models (per design decision #17) — suitable for
# development and early demos; revisit at demo time against current top-tier
# efficient + cheap picks on OpenRouter.
#
# Stage purposes:
#   filter             - Fast cheap triage; ~70% of signals rejected here (5s cap)
#   classify           - Deep classification + full taxonomy extraction (30s cap)
#   routing_tiebreaker - LLM fallback when no rule matches and confidence is low
#   memory_query       - Natural-language → structured filter translation
#
# Brand override semantics: brands/<slug>/models.yaml may override any stage.
# Field-level merge over these defaults; list fields (fallbacks) replace whole.
# See docs/design_decisions.md decisions #15-17.
# =============================================================================

defaults:
  # Testing-cheap config (May 2026). For the recorded demo, swap classify to
  # claude-sonnet-4-6 and re-enable brand-specific Opus overrides where they exist.
  filter:
    model: google/gemini-2.5-flash
    temperature: 0.0
    max_tokens: 64
    timeout_s: 5
    fallbacks:
      - openai/gpt-4.1-mini
      - anthropic/claude-haiku-4-5

  classify:
    # Long-prompt JSON reliability mattered more than raw cost: Haiku 4.5
    # flaked on ~60% of strict-JSON outputs against the enriched
    # understanding.md. Sonnet 4.6 holds schema cleanly. Haiku stays
    # in the fallback slot for cheap-retry on outages.
    model: anthropic/claude-sonnet-4-6
    temperature: 0.1
    max_tokens: 1024
    timeout_s: 30
    fallbacks:
      - anthropic/claude-haiku-4-5
      - openai/gpt-5-mini

  routing_tiebreaker:
    model: google/gemini-2.5-flash
    temperature: 0.0
    max_tokens: 128
    timeout_s: 10
    fallbacks:
      - anthropic/claude-haiku-4-5

  route:
    model: google/gemini-2.5-flash
    temperature: 0.0
    max_tokens: 256
    timeout_s: 10
    fallbacks:
      - anthropic/claude-haiku-4-5

  memory_query:
    model: google/gemini-2.5-flash
    temperature: 0.0
    max_tokens: 256
    timeout_s: 10
    fallbacks:
      - anthropic/claude-haiku-4-5

# Run-scoped profiles are inert unless explicitly passed to load_models_config
# or build_gateway. The demo population CLI selects this profile so normal
# global and per-brand production behavior remains unchanged.
profiles:
  demo_population:
    filter:
      model: google/gemini-3.1-flash-lite
      temperature: 0.0
      max_tokens: 64
      timeout_s: 5
      fallbacks:
